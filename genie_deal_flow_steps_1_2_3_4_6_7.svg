<svg viewBox="0 0 1480 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c9a24b"/>
    </marker>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6a2fb5"/>
      <stop offset="1" stop-color="#3b5bdb"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1480" height="780" fill="#000000"/>

  <!-- ===================== webTrader ===================== -->
  <rect x="20" y="30" width="480" height="250" rx="10" fill="#4a0d18" stroke="#7a1e2e" stroke-width="2"/>
  <text x="260" y="52" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">webTrader</text>

  <!-- Genie UI -->
  <rect x="45" y="85" width="430" height="115" rx="6" fill="#000000" stroke="#9a9a9a" stroke-width="1.5"/>
  <text x="260" y="108" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">Genie</text>
  <text x="260" y="125" fill="#d8d8d8" font-size="11" text-anchor="middle">UI for Deal Planning Summary and approval</text>
  <rect x="70" y="145" width="380" height="34" rx="4" fill="url(#btn)"/>
  <text x="260" y="167" fill="#ffffff" font-size="11.5" font-weight="bold" text-anchor="middle">Approve Creation of Selected Deals/Schedules</text>

  <!-- START flag -->
  <line x1="205" y1="222" x2="205" y2="248" stroke="#2ecc71" stroke-width="2"/>
  <path d="M205,223 L224,229 L205,235 z" fill="#2ecc71"/>
  <text x="200" y="262" fill="#2ecc71" font-size="10" text-anchor="middle">START</text>

  <!-- Genie Chat bot -->
  <rect x="255" y="215" width="175" height="42" rx="6" fill="#000000" stroke="#b03030" stroke-width="1.5"/>
  <text x="342" y="240" fill="#e06060" font-size="12" font-weight="bold" text-anchor="middle">Genie Chat bot</text>

  <!-- Read-only replica DB -->
  <path d="M290,415 a70,14 0 0 0 140,0 L430,510 a70,14 0 0 1 -140,0 z" fill="#141414" stroke="#8a8a8a" stroke-width="1.5"/>
  <ellipse cx="360" cy="415" rx="70" ry="14" fill="#141414" stroke="#8a8a8a" stroke-width="1.5"/>
  <text x="360" y="436" fill="#e8e8e8" font-size="9.5" font-weight="bold" text-anchor="middle">webTrader Operational</text>
  <text x="360" y="449" fill="#e8e8e8" font-size="9.5" font-weight="bold" text-anchor="middle">Database</text>
  <text x="360" y="462" fill="#e8e8e8" font-size="9.5" font-weight="bold" text-anchor="middle">(Read-only replica)</text>
  <text x="360" y="480" fill="#c8c8c8" font-size="9" text-anchor="middle">Deal Schedules</text>
  <text x="360" y="492" fill="#c8c8c8" font-size="9" text-anchor="middle">Tags</text>
  <text x="360" y="504" fill="#c8c8c8" font-size="9" text-anchor="middle">Bookouts</text>

  <!-- ===================== OATI Genie ===================== -->
  <rect x="540" y="30" width="730" height="560" rx="12" fill="#050505" stroke="#5566aa" stroke-width="2"/>
  <text x="905" y="52" fill="#ffffff" font-size="15" font-weight="bold" text-anchor="middle">OATI Genie&#8482;</text>

  <!-- Report Output Agent -->
  <rect x="830" y="110" width="225" height="70" rx="6" fill="#000000" stroke="#9a9a9a" stroke-width="1.5"/>
  <text x="942" y="140" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">Deal/Schedule Planning</text>
  <text x="942" y="157" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">Report Output Agent</text>

  <!-- Orchestrator Agent -->
  <rect x="790" y="250" width="165" height="70" rx="6" fill="#000000" stroke="#9a9a9a" stroke-width="1.5"/>
  <text x="872" y="290" fill="#ffffff" font-size="12.5" font-weight="bold" text-anchor="middle">Orchestrator Agent</text>

  <!-- Planning Agent -->
  <rect x="760" y="375" width="330" height="175" rx="6" fill="#000000" stroke="#9a9a9a" stroke-width="1.5"/>
  <text x="925" y="400" fill="#ffffff" font-size="12.5" font-weight="bold" text-anchor="middle">Deal/Schedule Planning Agent</text>
  <rect x="790" y="415" width="270" height="120" rx="4" fill="#000000" stroke="#555555" stroke-width="1"/>
  <text x="925" y="440" fill="#d6d6d6" font-size="10.5" text-anchor="middle">Review all the tags facing Amazon,</text>
  <text x="925" y="456" fill="#d6d6d6" font-size="10.5" text-anchor="middle">evaluate them by Source.</text>
  <text x="925" y="480" fill="#d6d6d6" font-size="10.5" text-anchor="middle">Plan the Sell trades to Amazon,</text>
  <text x="925" y="496" fill="#d6d6d6" font-size="10.5" text-anchor="middle">using the appropriate volumes</text>
  <text x="925" y="512" fill="#d6d6d6" font-size="10.5" text-anchor="middle">based on the rules set.</text>

  <!-- ===================== Brookfield ===================== -->
  <rect x="1300" y="365" width="160" height="110" rx="10" fill="#bcd3e8" stroke="#7a9cc0" stroke-width="2"/>
  <text x="1380" y="390" fill="#1a2b4a" font-size="13" font-weight="bold" text-anchor="middle">Brookfield</text>
  <rect x="1315" y="402" width="130" height="55" rx="6" fill="#e8b4c8" stroke="#c98aa6" stroke-width="1"/>
  <text x="1380" y="426" fill="#3a1a2a" font-size="10.5" text-anchor="middle">Source Type to be</text>
  <text x="1380" y="441" fill="#3a1a2a" font-size="10.5" text-anchor="middle">provided</text>

  <!-- ===================== Arrows ===================== -->
  <!-- Step 1: Chat bot -> Orchestrator -->
  <path d="M430,238 L655,238 L655,285 L786,285" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="545" y="333" fill="#e6c56a" font-size="10.5" text-anchor="middle">1. User Prompt to Create the trade(s)</text>
  <text x="545" y="347" fill="#e6c56a" font-size="10.5" text-anchor="middle">based on the tag(s) going to Amazon</text>

  <!-- Step 2: Orchestrator <-> Planning Agent -->
  <path d="M872,320 L872,373" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-dasharray="6 4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="985" y="338" fill="#e6c56a" font-size="10.5" text-anchor="middle">2. Generate</text>
  <text x="985" y="352" fill="#e6c56a" font-size="10.5" text-anchor="middle">sale deal report</text>

  <!-- Step 3: Planning Agent -> Read-only replica -->
  <path d="M758,465 L436,465" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="597" y="453" fill="#e6c56a" font-size="10.5" text-anchor="middle">3. Get unscheduled Tags, Purchase Deals</text>

  <!-- Step 4: Planning Agent <-> Brookfield -->
  <path d="M1090,452 L1298,420" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-dasharray="6 4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="1195" y="480" fill="#e6c56a" font-size="10.5" text-anchor="middle">4. Get Rule Set, Priority Order</text>

  <!-- Step 6: Orchestrator -> Report Output Agent -->
  <path d="M930,250 L930,182" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="990" y="219" fill="#e6c56a" font-size="10.5" text-anchor="middle">6. Route output</text>

  <!-- Step 7: Report Output Agent -> Genie UI -->
  <path d="M828,145 L478,145" fill="none" stroke="#c9a24b" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="653" y="133" fill="#e6c56a" font-size="10.5" text-anchor="middle">7. User Notification on Genie deal planning Report</text>
</svg>
